<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTIST PROFILE</title>
    <style>
        /* Simple Dark Theme */
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: "Courier New", Courier, monospace;
            margin: 0;
            padding: 40px 20px;
        }

        /* Clean Centered Header */
        header {
            text-align: center;
            margin-bottom: 50px;
            padding-bottom: 20px;
            border-bottom: 1px solid #222;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
            color: #ff00ff; /* Solid Pink accent */
        }

        header p {
            color: #888;
            margin: 0;
            font-size: 0.9rem;
        }

        /* Standard 2-Column Grid Layout (No tilts) */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            max-width: 950px;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            .main-layout {
                grid-template-columns: 1.6fr 1.4fr;
            }
        }

        /* Clean, Boxed Sections */
        .section-box {
            background-color: #121212;
            border: 1px solid #222;
            padding: 30px;
            border-radius: 4px;
        }

        .section-title {
            font-size: 1.3rem;
            color: #00ffff; /* Solid Cyan accent */
            margin-top: 0;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Clean Text Formatting */
        p {
            line-height: 1.6;
            color: #ccc;
            margin: 0 0 15px 0;
        }

        /* Navigation & Social Links */
        .links-container a {
            display: block;
            color: #00ff00; /* Solid Green links */
            text-decoration: none;
            font-size: 1.2rem;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #222;
            border-radius: 4px;
            background-color: #161616;
            transition: all 0.2s ease;
        }

        .links-container a:hover {
            background-color: #222;
            color: #fff;
            border-color: #444;
        }

        /* Footer Info */
        .stats-footer {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px dashed #222;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>

    <header>
        <h1>h4mzam</h1>
        <p>hyperpop indie alt rock artist in canada.</p>
    </header>

    <div class="main-layout">
        
        <!-- LEFT COLUMN: MUSIC PLAYER -->
        <div class="section-box">
            <h2 class="section-title">Latest Release</h2>
            <p>Stream music and latest tracks directly below:</p>
            
            <!-- Clean Spotify Embed Player -->
            <div style="margin-top: 20px;">
                <iframe style="border-radius:12px" src="https://open-spotify-com.translate.goog/embed/artist/1eQCOV4rJCSPWRJTcAGUz0?utm_source=generator" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>
        </div>

        <!-- RIGHT COLUMN: LINKS & PROFILE -->
        <div class="section-box">
            <h2 class="section-title">Socials & Hubs</h2>
            <p>Stream / Follow / Contact:</p>
            
            <div class="links-container">
                <!-- Clean, predictable button blocks -->
                <a href="https://open.spotify.com/artist/1eQCOV4rJCSPWRJTcAGUz0?si=gvk8v5sVRxuG1f2qi5NWmQ" target="_blank">[ SPOTIFY ]</a>
                <a href="https://www.youtube.com" target="_blank">[ YOUTUBE ]</a>
                <a href="https://www.tiktok.com" target="_blank">[ TIKTOK ]</a>
                <a href="https://x.com/fazli_hamza" target="_blank">[ X / TWITTER ]</a>
            </div>

            <div class="stats-footer">
                <p style="margin: 0;">thanks for listening (:</p>
            </div>
        </div>

    </div>

</body>
</html>
